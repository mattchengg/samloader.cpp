name: samloader build

on:
  workflow_dispatch:

jobs:
  linux:
    name: Build for Linux
    runs-on: ubuntu-24.04
    steps:
      - name: Check out
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get -y install cmake clang libcurl4-openssl-dev libssl-dev xz-utils

      - name: Build samloader
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j
